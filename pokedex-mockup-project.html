<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Jc_Pokedex_styles.css">
    <title>Pokedex Project</title>
</head>
<body>
    <header>
        <h1>CreatureDex</h1>
    </header>

    <input type="text" id="search-input" placeholder="Enter Pokémon name or Pokedex number." required>
    <button id="search-button">Search</button>

    <div id="creature-stats">
        <div id="creature-name"></div>
        <div id="creature-id"></div>
        <div id="weight"></div>
        <div id="height"></div>
        <div id="types"></div>
        <div id="hp"></div>
        <div id="attack"></div>
        <div id="defense"></div>
        <div id="special-attack"></div>
        <div id="special-defense"></div>
        <div id="special-name"></div>
        <div id="special-description"></div>
        <div id="speed"></div>
    </div>
    
<script src="Jc_Pokedex_script.js"></script>
</body>
</html>
